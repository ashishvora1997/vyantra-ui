    <!-- ── Anti-FOUC: apply stored color scheme before React mounts ──────── -->
    <!--
      Reads vyantra-scheme from localStorage and sets data-theme on <html>
      synchronously — before any CSS or JS has loaded — so there is never
      a flash of the wrong theme on page load.
    -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem('vyantra-scheme');
          var t =
            s === 'dark' || s === 'light'
              ? s
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.setAttribute('data-theme', t);
        } catch (_) {
          /* storage blocked — fall back to html attr default */
        }
      })();
    </script>
